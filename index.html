<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Aging - Postarzanie Twarzy</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center}
  h1{margin:2rem 0 .5rem;font-size:2rem;background:linear-gradient(135deg,#6366f1,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
  .subtitle{color:#888;margin-bottom:2rem;text-align:center;font-size:.9rem}
  .container{width:100%;max-width:900px;padding:0 1.5rem 3rem}

  /* API Key */
  .api-section{background:#14141f;border:1px solid #1e1e30;border-radius:12px;padding:1.2rem;margin-bottom:1.5rem}
  .api-section label{display:block;font-size:.85rem;color:#aaa;margin-bottom:.5rem}
  .api-input{width:100%;padding:.7rem 1rem;background:#0d0d15;border:1px solid #2a2a40;border-radius:8px;color:#e0e0e0;font-size:.9rem;outline:none;transition:border .2s}
  .api-input:focus{border-color:#6366f1}

  /* Drop zone */
  .drop-zone{border:2px dashed #2a2a40;border-radius:16px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .3s;background:#14141f;margin-bottom:1.5rem}
  .drop-zone:hover,.drop-zone.drag-over{border-color:#6366f1;background:#18182a}
  .drop-zone-icon{font-size:3rem;margin-bottom:1rem;opacity:.5}
  .drop-zone p{color:#888;font-size:.95rem}
  .drop-zone .hint{font-size:.8rem;color:#555;margin-top:.5rem}
  .drop-zone.has-file{border-color:#22c55e;border-style:solid}
  .drop-zone.has-file .drop-zone-icon{opacity:1}
  .file-name{color:#22c55e;font-size:.85rem;margin-top:.5rem;word-break:break-all}

  /* Slider */
  .slider-section{background:#14141f;border:1px solid #1e1e30;border-radius:12px;padding:1.2rem;margin-bottom:1.5rem}
  .slider-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem}
  .slider-header label{font-size:.95rem;color:#ccc}
  .age-value{background:linear-gradient(135deg,#6366f1,#a855f7);padding:.3rem .8rem;border-radius:20px;font-weight:700;font-size:.9rem}
  input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:#1e1e30;border-radius:3px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:linear-gradient(135deg,#6366f1,#a855f7);border-radius:50%;cursor:pointer;box-shadow:0 0 10px rgba(99,102,241,.4)}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;background:linear-gradient(135deg,#6366f1,#a855f7);border-radius:50%;cursor:pointer;border:none}

  /* Button */
  .btn{width:100%;padding:1rem;font-size:1.05rem;font-weight:600;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;transition:all .3s;margin-bottom:2rem}
  .btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 25px rgba(99,102,241,.35)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

  /* Results */
  .results{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
  .result-card{background:#14141f;border:1px solid #1e1e30;border-radius:16px;overflow:hidden}
  .result-card h3{padding:1rem 1.2rem .5rem;font-size:.9rem;color:#888;text-transform:uppercase;letter-spacing:.05em}
  .result-card img{width:100%;display:block;padding:0 1rem 1rem}
  .result-card .img-wrap{position:relative;min-height:200px;display:flex;align-items:center;justify-content:center;padding:1rem}
  .result-card .img-wrap img{padding:0;border-radius:8px;max-height:450px;object-fit:contain;width:100%}

  /* Spinner */
  .spinner-overlay{position:absolute;inset:0;background:rgba(20,20,31,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:0 0 16px 16px;gap:1rem}
  .spinner{width:48px;height:48px;border:4px solid #1e1e30;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner-text{color:#aaa;font-size:.85rem}

  /* Error */
  .error-msg{background:#2d1215;border:1px solid #5c2028;color:#f87171;padding:1rem;border-radius:12px;margin-bottom:1.5rem;font-size:.9rem;display:none}

  /* Download */
  .download-btn{display:inline-block;margin:.5rem 1rem 1rem;padding:.5rem 1rem;background:#1e1e30;border:1px solid #2a2a40;border-radius:8px;color:#a855f7;font-size:.8rem;text-decoration:none;transition:all .2s}
  .download-btn:hover{background:#2a2a40;color:#c084fc}

  @media(max-width:640px){
    .results{grid-template-columns:1fr}
    h1{font-size:1.5rem}
  }
</style>
</head>
<body>

<h1>Face Aging AI</h1>
<p class="subtitle">Postarzanie twarzy z wykorzystaniem OpenAI GPT Image API</p>

<div class="container">
  <div class="api-section">
    <label for="apiKey">OpenAI API Key</label>
    <input type="password" id="apiKey" class="api-input" placeholder="sk-...">
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon">&#128247;</div>
    <p>Przeciagnij zdjecie tutaj lub kliknij, aby wybrac</p>
    <p class="hint">JPG, PNG, WebP &bull; maks. 20 MB</p>
    <p class="file-name" id="fileName"></p>
  </div>
  <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" hidden>

  <div class="slider-section">
    <div class="slider-header">
      <label>O ile lat postarzec?</label>
      <span class="age-value" id="ageDisplay">+20 lat</span>
    </div>
    <input type="range" id="ageSlider" min="1" max="50" value="20">
  </div>

  <button class="btn" id="processBtn" disabled>Postarzej twarz</button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="results" id="results" style="display:none">
    <div class="result-card">
      <h3>Oryginal</h3>
      <div class="img-wrap">
        <img id="originalImg" alt="Oryginalne zdjecie">
      </div>
    </div>
    <div class="result-card">
      <h3>Postarzone</h3>
      <div class="img-wrap" id="resultWrap">
        <img id="resultImg" alt="Postarzone zdjecie" style="display:none">
      </div>
      <a class="download-btn" id="downloadBtn" style="display:none" download="aged_face.png">Pobierz wynik</a>
    </div>
  </div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileName = document.getElementById('fileName');
const ageSlider = document.getElementById('ageSlider');
const ageDisplay = document.getElementById('ageDisplay');
const processBtn = document.getElementById('processBtn');
const apiKeyInput = document.getElementById('apiKey');
const errorMsg = document.getElementById('errorMsg');
const results = document.getElementById('results');
const originalImg = document.getElementById('originalImg');
const resultImg = document.getElementById('resultImg');
const resultWrap = document.getElementById('resultWrap');
const downloadBtn = document.getElementById('downloadBtn');

let selectedFile = null;

// Drop zone
dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('drag-over');
});

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
});

function handleFile(file) {
  selectedFile = file;
  dropZone.classList.add('has-file');
  fileName.textContent = file.name;
  updateBtn();

  const reader = new FileReader();
  reader.onload = e => {
    originalImg.src = e.target.result;
    results.style.display = 'grid';
    resultImg.style.display = 'none';
    downloadBtn.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// Slider
ageSlider.addEventListener('input', () => {
  ageDisplay.textContent = `+${ageSlider.value} lat`;
});

function updateBtn() {
  processBtn.disabled = !selectedFile || !apiKeyInput.value.trim();
}
apiKeyInput.addEventListener('input', updateBtn);

// Show error
function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
  setTimeout(() => { errorMsg.style.display = 'none'; }, 8000);
}

// Process
processBtn.addEventListener('click', async () => {
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) { showError('Wprowadz klucz API OpenAI.'); return; }
  if (!selectedFile) { showError('Wgraj zdjecie.'); return; }

  const years = ageSlider.value;

  // Show spinner
  processBtn.disabled = true;
  processBtn.textContent = 'Przetwarzanie...';
  resultImg.style.display = 'none';
  downloadBtn.style.display = 'none';

  const spinner = document.createElement('div');
  spinner.className = 'spinner-overlay';
  spinner.innerHTML = '<div class="spinner"></div><span class="spinner-text">Generowanie... moze to zajac do 60s</span>';
  resultWrap.appendChild(spinner);

  try {
    const formData = new FormData();
    formData.append('model', 'gpt-image-1');
    formData.append('image[]', selectedFile);
    formData.append('prompt',
      `Age this person's face by ${years} years. Keep everything else identical - same lighting, background, clothing, expression. The result should look natural and realistic.`
    );
    formData.append('size', '1024x1024');
    formData.append('quality', 'high');

    const response = await fetch('https://api.openai.com/v1/images/edits', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${apiKey}` },
      body: formData
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error: ${response.status}`);
    }

    const data = await response.json();
    const b64 = data.data[0].b64_json;
    const url = data.data[0].url;

    if (b64) {
      const imgSrc = `data:image/png;base64,${b64}`;
      resultImg.src = imgSrc;
      downloadBtn.href = imgSrc;
    } else if (url) {
      resultImg.src = url;
      downloadBtn.href = url;
    }

    resultImg.style.display = 'block';
    downloadBtn.style.display = 'inline-block';
  } catch (err) {
    showError(err.message);
  } finally {
    spinner.remove();
    processBtn.disabled = false;
    processBtn.textContent = 'Postarzej twarz';
    updateBtn();
  }
});
</script>
</body>
</html>
